name: SE333_CI

on:
  push:
    branches:
      - main

jobs:
  SE333_CI_JOB:
    runs-on: ubuntu-latest

    steps:
      - name: checkout-repo
        uses: actions/checkout@v4

      - name: setupJava
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          architecture: x64
          cache: maven

      - name: Install Linter
        run: echo "Checkstyle runs through Maven"

      - name: Run Checkstyle
        run: mvn checkstyle:checkstyle || true

      - name: Upload Checkstyle Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-report
          path: target/checkstyle-result.xml
          if-no-files-found: warn

      - name: Run Maven Test
        run: mvn clean test

      - name: Jacoco Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: |
            target/site/jacoco/
            target/jacoco.exec
          if-no-files-found: warn
