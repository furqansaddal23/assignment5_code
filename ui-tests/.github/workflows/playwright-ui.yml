name: Playwright_UI

on:
  push:
    branches:
      - main

jobs:
  playwright-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    defaults:
      run:
        working-directory: ui-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '23'
          cache: maven

      - name: Install Playwright browsers
        run: mvn exec:java -e -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install --with-deps"

      - name: Run Playwright traditional test
        run: mvn -Dtest=org.example.playwrightTraditional.BookstoreTraditionalTest test

      - name: Upload Playwright videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-videos
          path: ui-tests/videos
          if-no-files-found: warn

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-reports
          path: ui-tests/target/surefire-reports
          if-no-files-found: warn
